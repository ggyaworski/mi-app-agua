<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Recordatorio de Hidratación</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Mi Hidratación</h1>
        
        <button id="btn-permiso" class="btn-permiso" onclick="solicitarPermisoNotificaciones()" style="display: none;">
            🔔 Activar Recordatorios en el Celu
        </button>

        <div class="card">
            <h3>Mis Datos Biométricos</h3>
            <div class="grid-inputs">
                <div class="input-group">
                    <label for="txt-peso">Peso (kg)</label>
                    <input type="number" id="txt-peso" value="70">
                </div>
                <div class="input-group">
                    <label for="txt-altura">Altura (cm)</label>
                    <input type="number" id="txt-altura" value="165">
                </div>
                <div class="input-group">
                    <label for="txt-edad">Edad</label>
                    <input type="number" id="txt-edad" value="30">
                </div>
            </div>
            <button onclick="guardarPerfil()" style="width: 100%; margin-top: 15px;">Calcular Meta Exacta</button>
            <div class="meta-destacada">Meta Agua Pura: <span id="lbl-meta-agua">2100</span> ml</div>
        </div>

        <div class="card" id="seccion-colageno">
            <h3>Rutina de la Mañana</h3>
            <button class="btn-colageno" id="btn-colageno" onclick="tomarColageno()">Tomar Colágeno (150ml)</button>
        </div>

        <div class="card">
            <h3>Registrar Consumo</h3>
            <div class="grid-botones">
                <button class="btn-consumo" onclick="sumarLiquido('agua', 250)">
                    <span>💧</span>
                    <span>Agua (250ml)</span>
                </button>
                <button class="btn-consumo btn-mate" onclick="sumarLiquido('mate', 500)">
                    <span>🧉</span>
                    <span>Mate (500ml)</span>
                </button>
                <button class="btn-consumo" onclick="sumarLiquido('infusion', 250)">
                    <span>☕</span>
                    <span>Café/Té (250ml)</span>
                </button>
            </div>
        </div>

        <div class="card">
            <h3>Progreso del Día</h3>
            <p>Agua Pura (y colágeno): <span id="lbl-agua">0</span> / <span id="lbl-meta-dinamica">2100</span> ml</p>
            <p>Mate e Infusiones: <span id="lbl-otros">0</span> ml</p>
            
            <button class="btn-reset" onclick="borrarProgreso()">🗑️ Reiniciar Consumo Diario</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
